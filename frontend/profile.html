<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حسابي - CrownMob</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="profile-page-container">
        <aside class="profile-sidebar">
            <div class="user-avatar-box">
                <i class="fas fa-user-circle avatar-icon"></i>
                <h3 id="prof-name">اسم المستخدم</h3>
                <p id="prof-email">البريد الإلكتروني</p>
            </div>
            
            <ul class="profile-nav">
                <li class="active"><i class="fas fa-id-card"></i> تفاصيل الحساب</li>
                <li><i class="fas fa-box-open"></i> طلباتي</li>
                <li><i class="fas fa-heart"></i> المفضلة</li>
                <li><i class="fas fa-map-marker-alt"></i> العناوين</li>
                <li onclick="logout()" style="color: #ff4757; margin-top: 20px;"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</li>
            </ul>
        </aside>

        <main class="profile-content">
            <div class="profile-card">
                <h2 class="section-title">المعلومات الشخصية</h2>
                
                <div class="info-grid">
                    <div class="info-group">
                        <label>الاسم الكامل</label>
                        <input type="text" id="edit-name" disabled>
                    </div>
                    <div class="info-group">
                        <label>البريد الإلكتروني</label>
                        <input type="email" id="edit-email" disabled>
                    </div>
                    <div class="info-group">
                        <label>رقم الموبايل</label>
                        <input type="tel" id="edit-phone" disabled>
                    </div>
                    <div class="info-group">
                        <label>العنوان الأساسي</label>
                        <input type="text" id="edit-address" disabled>
                    </div>
                </div>
                
                <button class="edit-profile-btn" onclick="alert('سيتم تفعيل تعديل البيانات قريباً')">تعديل البيانات</button>
            </div>
        </main>
    </div>

    <script src="index.js"></script>
    <script>
        // سكريبت خاص بصفحة البروفايل لجلب البيانات
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            
            // لو مش مسجل دخول يطرده لصفحة اللوجين
            if(!user) {
                window.location.href = "login.html";
                return;
            }

            // وضع البيانات في الحقول
            document.getElementById('prof-name').innerText = user.name;
            document.getElementById('prof-email').innerText = user.email;
            
            document.getElementById('edit-name').value = user.name;
            document.getElementById('edit-email').value = user.email;
            document.getElementById('edit-phone').value = user.phone;
            document.getElementById('edit-address').value = user.address;
        });
    </script>
</body>
</html>
